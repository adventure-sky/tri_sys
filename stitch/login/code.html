<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-4">
<!-- The Shell Logic: Navigation is suppressed for transactional login screen -->
<main class="w-full max-w-[340px]">
<!-- Brand Identity Section -->
<div class="mb-8 text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary-container/10 mb-4">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="account_tree">account_tree</span>
</div>
<h1 class="text-[1.125rem] font-bold text-primary tracking-tight mb-1">三層式資料維護系統</h1>
<p class="text-on-surface-variant text-[0.875rem]">請登入以繼續</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_12px_32px_rgba(0,93,170,0.06)] overflow-hidden">
<div class="p-6 md:p-8">
<form class="space-y-5">
<!-- User ID Input -->
<div class="space-y-1.5">
<label class="text-[0.75rem] font-medium text-on-surface-variant block px-1" for="user_id">用戶代碼</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="person">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-highest border-transparent focus:border-primary focus:ring-0 rounded-lg text-on-surface text-[0.875rem] transition-all placeholder:text-outline-variant" id="user_id" name="user_id" placeholder="請輸入您的帳號" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="text-[0.75rem] font-medium text-on-surface-variant block px-1" for="password">密碼</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-highest border-transparent focus:border-primary focus:ring-0 rounded-lg text-on-surface text-[0.875rem] transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember & Forgot (UI Polish) -->
<div class="flex items-center justify-between px-1">
<label class="flex items-center space-x-2 cursor-pointer">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20" type="checkbox"/>
<span class="text-[0.75rem] text-on-surface-variant">記住我</span>
</label>
<a class="text-[0.75rem] text-primary font-medium hover:underline" href="#">忘記密碼？</a>
</div>
<!-- Submit Button -->
<button class="primary-gradient w-full py-3 px-4 rounded-lg text-white font-semibold text-[0.875rem] shadow-md shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
<span>登入</span>
<span class="material-symbols-outlined text-sm" data-icon="login">login</span>
</button>
</form>
</div>
<!-- Card Footer -->
<div class="bg-surface-container-low px-6 py-4 flex justify-center border-t border-outline-variant/10">
<p class="text-[0.75rem] text-on-surface-variant">
                    系統版本 <span class="font-mono font-medium">V2.4.0</span>
</p>
</div>
</div>
<!-- System Status Indicator (Editorial Style) -->
<div class="mt-8 flex items-center justify-center space-x-4">
<div class="flex items-center space-x-1.5">
<span class="w-2 h-2 rounded-full bg-emerald-500"></span>
<span class="text-[0.625rem] font-medium text-on-surface-variant uppercase tracking-widest">System Online</span>
</div>
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<div class="flex items-center space-x-1.5">
<span class="material-symbols-outlined text-xs text-on-surface-variant" data-icon="language">language</span>
<span class="text-[0.625rem] font-medium text-on-surface-variant uppercase tracking-widest">Secure Server</span>
</div>
</div>
</main>
<!-- Decorative Aesthetic Background Elements -->
<div class="fixed top-0 right-0 -z-10 w-1/2 h-full opacity-20 pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-primary/10 blur-[100px]"></div>
<div class="absolute bottom-[-5%] right-[5%] w-[300px] h-[300px] rounded-full bg-secondary/10 blur-[80px]"></div>
</div>
